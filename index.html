<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRUDinho</title>

    <style>
      body {
        font-family: Arial, Helvetica, sans-serif;
        margin: 40px;
      }

      h1 {
        text-align: center;
        font-size: 2.5rem;
        font-family: Impact, sans-serif;
        color: cadetblue;
        text-shadow: 2px 2px #000;
      }

      table {
        border-collapse: collapse;
        width: 100%;
        margin-top: 20px;
      }

      th,
      td {
        border: 1px solid #ccc;
        padding: 8px;
        text-align: center;
      }

      th {
        background: #f0f0f0;
      }

      form {
        margin-bottom: 20px;
        text-align: center;
      }

      input,
      button {
        padding: 6px;
      }
    </style>
  </head>

  <body>
    <h1>CRUDinho</h1>

    <form id="addForm">
      <input type="hidden" id="produtoId" />
      <input type="text" id="nome" placeholder="Nome do Produto" required />
      <input type="number" id="preco" placeholder="Preço do Produto" required />
      <input
        type="number"
        id="quantidade"
        placeholder="Quantidade de Produtos"
        required
      />

      <button type="submit">Salvar</button>
      <button type="button" id="cancelarEdicao" style="display: none">
        Cancelar
      </button>
    </form>

    <table>
      <thead>
        <tr>
          <th>Ordem</th>
          <th>Nome</th>
          <th>Preço</th>
          <th>Quantidade</th>
          <th>Atualizar</th>
          <th>Remover</th>
        </tr>
      </thead>
      <tbody id="lista"></tbody>
    </table>
  </body>

  <script>
    //variaveis globais
    const produtoId = document.getElementById("produtoId");
    const campoNome = document.getElementById("nome");
    const campoPreco = document.getElementById("preco");
    const campoQuantidade = document.getElementById("quantidade");
    const btnCancelarEdicao = document.getElementById("cancelarEdicao");
    const addForm = document.getElementById("addForm");

    async function carregarDados() {
      const resp = await fetch("http://localhost:3000/produtos");
      const dados = await resp.json();

      const lista = document.getElementById("lista");

      lista.innerHTML = "";

      dados.forEach((produto, indice) => {
        const tr = document.createElement("tr");

        tr.innerHTML = `
            <td>${indice + 1}</td>
            <td>${produto.nome}</td>
            <td>${produto.preco}</td>
            <td>${produto.quantidade}</td>
            <td> <button onclick="editar(${produto.id}, '${produto.nome}', ${produto.preco}, ${produto.quantidade})">Editar</button> </td>
            <td> <button onclick="remover(${produto.id})">Remover</button> </td>
            `;

        lista.appendChild(tr);
      });
    }

    // Função para remover um produto pelo id
    async function remover(id) {
      await fetch(`http://localhost:3000/produtos/${id}`, { method: "DELETE" });
      carregarDados();
    }

    // Função global para editar produto: preenche o formulário e ativa modo edição
    window.editar = (id, nome, preco, quantidade) => {
      produtoId.value = id;
      campoNome.value = nome;
      campoPreco.value = preco;
      campoQuantidade.value = quantidade;
      btnCancelarEdicao.style.display = "";
    };

    // Função para cancelar a edição e limpar o formulário
    btnCancelarEdicao.onclick = () => {
      produtoId.value = "";
      addForm.reset();
      btnCancelarEdicao.style.display = "none";
    };

    // Função para tratar o envio do formulário (adicionar ou atualizar)
    addForm.onsubmit = async (e) => {
      e.preventDefault();

      const id = produtoId.value;
      const nome = campoNome.value;
      const preco = campoPreco.value;
      const quantidade = campoQuantidade.value;

      if (id) {
        // Se tem id, está editando: faz PUT para atualizar
        await fetch(`http://localhost:3000/produtos/${id}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ nome, preco, quantidade }),
        });
      } else {
        // Se não tem id, está cadastrando novo: faz POST
        await fetch("http://localhost:3000/produtos", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ nome, preco, quantidade }),
        });
      }

      e.target.reset();
      produtoId.value = "";
      btnCancelarEdicao.style.display = "none";
      carregarDados();
    };

    carregarDados();
  </script>
</html>
